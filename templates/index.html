<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Missão Artemis</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0b0f1a;
            color: white;
            text-align: center;
            margin: 0;
        }

        header {
            background: #111827;
            padding: 20px;
        }

        h1 {
            color: #61dafb;
        }

        .logo {
            width: 200px;
            margin-top: 20px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .galeria img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>

</head>

<body>

<header>
    <h1>Missão Artemis</h1>
</header>

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Artemis_program_logo.svg/512px-Artemis_program_logo.svg.png">

<h2>Retorno da humanidade à Lua</h2>

<p>
A missão Artemis tem como objetivo levar novamente humanos à Lua,
incluindo a primeira mulher e a primeira pessoa negra na superfície lunar.
</p>

<h2>Galeria</h2>

<div class="galeria">

    <img src="https://aventurasnahistoria.com.br/wp-content/uploads/2026/01/artemis-ii-1-800x450.jpg">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSryA3MzFg1Do8wvKcAC3E3PST4rQPU-Eo9aw&s">
    
</div>

</body>
</html>
